<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Service — GymForge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div id="gf-navbar"></div>

  <div class="dashboard-layout" id="layout-root">

    <aside class="sidebar" id="gf-sidebar" style="display:none;"></aside>

    <main class="dashboard-content" id="main-area">

      <h2 class="fw-display mb-1">BOOK A <span class="text-primary-gf">SERVICE</span></h2>
      <p class="text-muted-gf fw-condensed mb-4" style="font-size:0.85rem;letter-spacing:1px;text-transform:uppercase;">Select a service and fill in the booking details</p>

      <div class="gf-alert gf-alert-success" id="book-success"></div>
      <div class="gf-alert gf-alert-danger" id="book-error"></div>

      <div class="row g-4">

        <!-- Service Cards -->
        <div class="col-lg-7">
          <h5 class="fw-condensed mb-3" style="letter-spacing:2px;text-transform:uppercase;font-size:0.82rem;color:var(--text-muted);">Available Services</h5>
          <div id="service-cards" class="row g-3 mb-4"></div>
        </div>

        <!-- Booking Form -->
        <div class="col-lg-5">
          <div class="gf-card" style="position:sticky;top:80px;">
            <div class="gf-card-body">
              <h5 class="fw-condensed mb-1" style="letter-spacing:1px;text-transform:uppercase;font-size:0.85rem;color:var(--text-muted);">Booking Details</h5>

              <div id="selected-service-display" style="display:none;background:rgba(232,255,0,0.06);border:1px solid rgba(232,255,0,0.2);border-radius:var(--radius);padding:0.75rem;margin:1rem 0;">
                <div class="fw-condensed" style="font-size:0.8rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;">Selected Service</div>
                <div id="sel-service-name" style="font-family:var(--font-condensed);font-weight:700;font-size:1rem;color:var(--primary);"></div>
                <div id="sel-service-price" style="font-size:0.85rem;color:var(--text-muted);"></div>
              </div>

              <form id="booking-form" novalidate>
                <input type="hidden" id="selected-service-id"/>

                <div class="gf-form-group">
                  <label class="gf-label" for="machine-name">Machine / Equipment Name</label>
                  <input type="text" id="machine-name" class="gf-input" placeholder="e.g. PowerMax Treadmill T900"/>
                  <div class="gf-error" id="machine-err">Please enter the machine name.</div>
                </div>

                <div class="gf-form-group">
                  <label class="gf-label" for="booking-date">Preferred Date</label>
                  <input type="date" id="booking-date" class="gf-input"/>
                  <div class="gf-error" id="date-err">Please select a future date.</div>
                </div>

                <div class="gf-form-group">
                  <label class="gf-label" for="booking-time">Preferred Time</label>
                  <select id="booking-time" class="gf-input">
                    <option value="">— Select Time Slot —</option>
                    <option>08:00 AM – 10:00 AM</option>
                    <option>10:00 AM – 12:00 PM</option>
                    <option>12:00 PM – 02:00 PM</option>
                    <option>02:00 PM – 04:00 PM</option>
                    <option>04:00 PM – 06:00 PM</option>
                  </select>
                  <div class="gf-error" id="time-err">Please select a time slot.</div>
                </div>

                <div class="gf-form-group">
                  <label class="gf-label" for="booking-notes">Additional Notes (optional)</label>
                  <textarea id="booking-notes" class="gf-input" placeholder="Any specific requirements or instructions…" style="min-height:80px;"></textarea>
                </div>

                <button type="submit" class="btn-primary-gf w-100" id="book-btn">CONFIRM BOOKING</button>
              </form>

            </div>
          </div>
        </div>
      </div>

      <!-- My Bookings Table -->
      <div class="mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-condensed" style="letter-spacing:2px;text-transform:uppercase;font-size:0.82rem;color:var(--text-muted);">My Bookings</h5>
        </div>
        <div class="gf-card">
          <div class="gf-card-body">
            <div id="my-bookings-content">
              <p class="text-muted-gf fw-condensed" style="font-size:0.85rem;">You have no bookings yet.</p>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <div id="gf-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    $(document).ready(async function () {
      const user = await GF.loadUser();
      GF.renderNavbar('services');
      GF.renderFooter();

      if (user) {
        $('#gf-sidebar').show();
        GF_renderSidebar('services');
      } else {
        $('#layout-root').css('grid-template-columns', '1fr');
        $('#gf-sidebar').remove();
      }

      /* Min date = tomorrow */
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      $('#booking-date').attr('min', tomorrow.toISOString().split('T')[0]);

      /* Load services from API */
      let services = GF_DATA.services;
      try {
        const sRes = await API.getServices();
        if (sRes.success && sRes.services && sRes.services.length > 0) services = sRes.services;
      } catch(e) {}

      services.forEach(s => {
        $('#service-cards').append(`
          <div class="col-12">
            <div class="gf-card service-card" data-id="${s.id}" style="cursor:pointer;">
              <div class="gf-card-body d-flex gap-3 align-items-start">
                <div style="font-size:1.8rem;min-width:44px;text-align:center;color:var(--primary);"><i class="fa-solid ${s.icon}"></i></div>
                <div style="flex:1;">
                  <div class="d-flex justify-content-between align-items-start flex-wrap gap-1">
                    <h6 style="font-family:var(--font-condensed);font-weight:700;font-size:1rem;margin-bottom:0.25rem;">${s.name}</h6>
                    <span class="gf-badge gf-badge-muted" style="font-size:0.72rem;">${s.category}</span>
                  </div>
                  <p style="color:var(--text-muted);font-size:0.83rem;margin-bottom:0.5rem;">${s.description.substring(0,90)}…</p>
                  <div class="d-flex gap-3 flex-wrap">
                    <span style="color:var(--primary);font-family:var(--font-condensed);font-weight:700;">OMR ${parseFloat(s.price).toFixed(2)}</span>
                    <span style="color:var(--text-muted);font-size:0.82rem;font-family:var(--font-condensed);"><i class="fa-solid fa-clock"></i> ${s.duration}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>`);
      });

      let selectedServiceId = null;

      $(document).on('click', '.service-card', function () {
        $('.service-card').removeClass('selected');
        $(this).addClass('selected');
        selectedServiceId = $(this).data('id');
        const s = services.find(x => x.id == selectedServiceId);
        $('#selected-service-id').val(selectedServiceId);
        $('#sel-service-name').text(s.name);
        $('#sel-service-price').text('OMR ' + parseFloat(s.price).toFixed(2) + ' • ' + s.duration);
        $('#selected-service-display').show();
      });

      /* Load user bookings */
      async function loadBookings() {
        if (!user) return;
        let bookings = [];
        try {
          const bRes = await API.getBookings();
          if (bRes.success && bRes.bookings) bookings = bRes.bookings;
        } catch(e) {}
        if (bookings.length === 0 && user) {
          bookings = GF_DATA.getUserBookings(user.id).map(b => ({
            ...b,
            service_name: b.serviceName || 'Service',
            machine_name: b.machineName,
            booking_date: b.bookingDate
          }));
        }
        if (bookings.length === 0) {
          $('#my-bookings-content').html('<p class="text-muted-gf fw-condensed" style="font-size:0.85rem;">You have no bookings yet.</p>');
          return;
        }
        let tbl = `<div style="overflow-x:auto;"><table class="gf-table">
          <thead><tr><th>ID</th><th>Service</th><th>Machine</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        bookings.forEach(b => {
          const cls = b.status === 'Confirmed' ? 'gf-badge-success' : b.status === 'Cancelled' ? 'gf-badge-danger' : 'gf-badge-muted';
          const cancelBtn = b.status === 'Confirmed'
            ? `<button class="btn-outline-gf cancel-btn" data-id="${b.id}" style="font-size:0.75rem;padding:0.3rem 0.7rem;color:var(--danger);border-color:var(--danger);">Cancel</button>`
            : '—';
          tbl += `<tr>
            <td style="font-size:0.75rem;color:var(--text-muted);">${b.id}</td>
            <td>${b.service_name}</td>
            <td>${b.machine_name}</td>
            <td>${GF.formatDate(b.booking_date)}</td>
            <td><span class="gf-badge ${cls}">${b.status}</span></td>
            <td>${cancelBtn}</td>
          </tr>`;
        });
        tbl += '</tbody></table></div>';
        $('#my-bookings-content').html(tbl);
      }
      await loadBookings();

      /* Cancel booking */
      $(document).on('click', '.cancel-btn', async function () {
        if (!confirm('Cancel this booking?')) return;
        const bid = $(this).data('id');
        let res = { success: false };
        try { res = await API.cancelBooking(bid); } catch(e) {}
        if (!res.success) { GF_DATA.cancelBooking(bid); res = { success: true }; }
        if (res.success) { GF.toast('Booking cancelled.', 'success'); await loadBookings(); }
        else GF.toast(res.message || 'Failed to cancel.', 'error');
      });

      /* Booking form submit */
      $('#booking-form').on('submit', async function (e) {
        e.preventDefault();
        GF.clearAll(this);
        $('#book-success, #book-error').removeClass('show');

        if (!user) { window.location.href = '/pages/login.html'; return; }
        if (!selectedServiceId) { $('#book-error').text('Please select a service first.').addClass('show'); return; }

        const machineName = $('#machine-name').val();
        const bookingDate = $('#booking-date').val();
        const bookingTime = $('#booking-time').val();
        const notes       = $('#booking-notes').val();
        let valid = true;

        if (!GF.validate.required(machineName)) { GF.showError(document.getElementById('machine-name'), 'Please enter the machine name.'); valid=false; }
        if (!bookingDate) { GF.showError(document.getElementById('booking-date'), 'Please select a date.'); valid=false; }
        if (!bookingTime) { GF.showError(document.getElementById('booking-time'), 'Please select a time slot.'); valid=false; }
        if (!valid) return;

        const btn = document.getElementById('book-btn');
        btn.innerHTML = '<span class="gf-spinner"></span> BOOKING…';
        btn.disabled = true;

        let res = { success: false };
        try { res = await API.createBooking({ serviceId: selectedServiceId, machineName, bookingDate, bookingTime, notes }); } catch(e) {}
        if (!res.success) {
          const selSvc = services.find(s => s.id == selectedServiceId);
          GF_DATA.addBooking({ userId: user.id, serviceId: selectedServiceId, serviceName: selSvc ? selSvc.name : '', machineName, bookingDate, bookingTime, notes });
          const allB = GF_DATA.getUserBookings(user.id);
          res = { success: true, bookingId: allB[allB.length - 1].id };
        }
        btn.innerHTML = 'CONFIRM BOOKING'; btn.disabled = false;

        if (res.success) {
          $('#book-success').text('Booking confirmed! Reference: ' + res.bookingId).addClass('show');
          GF.toast('Booking confirmed!', 'success');
          $('#booking-form')[0].reset();
          $('#selected-service-display').hide();
          $('.service-card').removeClass('selected');
          selectedServiceId = null;
          await loadBookings();
        } else {
          $('#book-error').text(res.message || 'Booking failed.').addClass('show');
        }
      });
    });
  </script>
</body>
</html>
