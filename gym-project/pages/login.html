<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — GymForge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div id="gf-navbar"></div>

  <div class="auth-wrapper">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

          <div class="auth-box">
            <div class="auth-logo">GYM<span>FORGE</span></div>
            <div class="auth-tagline">Sign in to your account</div>

            <div class="gf-alert gf-alert-danger" id="login-error"></div>
            <div class="gf-alert gf-alert-success" id="login-success"></div>

            <form id="login-form" novalidate>

              <div class="gf-form-group">
                <label class="gf-label" for="email">Email Address</label>
                <input type="email" id="email" class="gf-input" placeholder="you@example.com" autocomplete="email"/>
                <div class="gf-error" id="email-err">Please enter a valid email address.</div>
              </div>

              <div class="gf-form-group">
                <label class="gf-label" for="password">Password</label>
                <div style="position:relative;">
                  <input type="password" id="password" class="gf-input" placeholder="Your password" autocomplete="current-password"/>
                  <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;" title="Show/hide password">👁</button>
                </div>
                <div class="gf-error" id="password-err">Password must be at least 6 characters.</div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.88rem;color:var(--text-muted);">
                  <input type="checkbox" id="remember-me" style="accent-color:var(--primary);"/>
                  Remember me
                </label>
                <a href="#" style="font-size:0.85rem;font-family:var(--font-condensed);color:var(--text-muted);">Forgot password?</a>
              </div>

              <button type="submit" class="btn-primary-gf w-100" id="login-btn">
                SIGN IN
              </button>

            </form>

            <hr class="gf-divider"/>

            <p style="text-align:center;font-size:0.9rem;color:var(--text-muted);">
              Don't have an account?
              <a href="register.html" style="color:var(--primary);font-weight:600;"> Register here</a>
            </p>

            <!-- Demo hint -->
            <div style="background:var(--surface-2);border:1px dashed var(--border);border-radius:var(--radius);padding:0.75rem;margin-top:1rem;font-size:0.8rem;color:var(--text-muted);font-family:var(--font-condensed);letter-spacing:0.5px;">
              <strong style="color:var(--primary);">DEMO:</strong> Register first, then log in with your credentials. Or use <strong>demo@gymforge.com / Demo1234</strong>
            </div>

          </div>

        </div>
      </div>
    </div>
  </div>

  <div id="gf-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    $(document).ready(async function () {
      // Check if already logged in via server session
      await GF.loadUser();
      GF.renderNavbar('login');
      GF.renderFooter();
      GF.redirectIfLoggedIn();

      /* Toggle password visibility */
      $('#toggle-pw').on('click', function () {
        const pw = $('#password');
        pw.attr('type', pw.attr('type') === 'password' ? 'text' : 'password');
      });

      /* Real-time validation */
      $('#email').on('blur', function () {
        if (!GF.validate.email($(this).val())) GF.showError(this, 'Please enter a valid email address.');
        else GF.clearError(this);
      });
      $('#password').on('blur', function () {
        if (!GF.validate.minLen($(this).val(), 6)) GF.showError(this, 'Password must be at least 6 characters.');
        else GF.clearError(this);
      });

      /* Form submission */
      $('#login-form').on('submit', async function (e) {
        e.preventDefault();
        GF.clearAll(this);
        $('#login-error').removeClass('show');

        const email    = $('#email').val();
        const password = $('#password').val();
        const remember = $('#remember-me').is(':checked');
        let valid = true;

        if (!GF.validate.email(email))        { GF.showError(document.getElementById('email'),    'Please enter a valid email address.'); valid = false; }
        if (!GF.validate.minLen(password, 6)) { GF.showError(document.getElementById('password'), 'Password must be at least 6 characters.'); valid = false; }
        if (!valid) return;

        const btn = document.getElementById('login-btn');
        btn.innerHTML = '<span class="gf-spinner"></span> SIGNING IN…';
        btn.disabled = true;

        const res = await API.login({ email, password, remember });
        if (res.success) {
          GF.setUser(res.user);
          $('#login-success').text('Login successful! Redirecting…').addClass('show');
          setTimeout(() => { window.location.href = '/pages/dashboard.html'; }, 900);
        } else {
          btn.innerHTML = 'SIGN IN';
          btn.disabled = false;
          $('#login-error').text(res.message || 'Invalid email or password.').addClass('show');
        }
      });
    });
  </script>
</body>
</html>
